version: "3.9"

services:
  # -----------------------------
  # Backend: Flask + Ollama
  # -----------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis-backend
    environment:
      FLASK_HOST: "0.0.0.0"
      FLASK_PORT: 12345
      OLLAMA_URL: "http://ollama:11434/api/chat" # connect to Ollama service
      GRAFANA_IP: "http://grafana:3000"
      GRAFANA_USER: "admin"
      GRAFANA_PASSWORD: "admin"
    ports:
      - "12345:12345"
    depends_on:
      - ollama
      - grafana

  # -----------------------------
  # Ollama container (phi4-mini model)
  # -----------------------------
  ollama:
    image: ollama/phi4-mini:latest
    container_name: ollama
    environment:
      MODEL: "phi4-mini"
    ports:
      - "11434:11434"

  # -----------------------------
  # Frontend: Next.js
  # -----------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aegis-frontend
    environment:
      PORT: 13000
      NEXT_PUBLIC_BACKEND_URL: "http://backend:12345" # communicate with backend
    ports:
      - "13000:13000"
    depends_on:
      - backend

volumes:
  grafana-data:
